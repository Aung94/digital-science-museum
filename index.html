<!-- Sharing functions -->
<script>
function shareOnFacebook(){
  const url=encodeURIComponent(window.location.href);
  const title=encodeURIComponent('Digital Science Museum — Interactive Science Exhibits');
  window.open('https://www.facebook.com/sharer/sharer.php?u='+url+'&quote='+title,'_blank','width=600,height=400');
}
function shareOnTwitter(){
  const url=encodeURIComponent(window.location.href);
  const text=encodeURIComponent('Check out this amazing interactive Digital Science Museum! 🔬🚀🧪 Build atoms, launch rockets, explore fractals and more!');
  window.open('https://twitter.com/intent/tweet?url='+url+'&text='+text,'_blank','width=600,height=400');
}
function copyLink(){
  navigator.clipboard.writeText(window.location.href).then(()=>{
    const btn=document.querySelector('.share-btn[onclick*="copyLink"]');
    const orig=btn.innerHTML;btn.innerHTML='<span style="font-size:12px">Copied!</span>';
    setTimeout(()=>btn.innerHTML=orig,2000);
  });
}
</script>
